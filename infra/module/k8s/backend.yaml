apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 685448855545.dkr.ecr.us-east-1.amazonaws.com/chatbot-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000

        # ✅ Correct env placement
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-secret
              key: GEMINI_API_KEY