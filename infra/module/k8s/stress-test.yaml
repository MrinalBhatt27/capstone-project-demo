apiVersion: v1
kind: Pod
metadata:
  name: stress-test-pod
spec:
  containers:
  - name: stress-container
    image: vish/stress
    resources:
      limits:
        memory: "500Mi"
        cpu: "500m"
    # This command consumes ~350MB of RAM (70% of 500MB)
    args: ["--mem-total", "350M", "--mem-alloc-size", "10M", "--mem-alloc-sleep", "1s"]